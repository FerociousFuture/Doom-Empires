<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom Empire | War Game Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary-fire: #ff6600;
            --secondary-fire: #ffcc00;
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --border-glow: rgba(255, 102, 0, 0.3);
            --text-light: #e0e0e0;
        }

        * { box-sizing: border-box; transition: all 0.25s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            background-image: 
                linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        header {
            padding: 30px 15px;
            text-align: center;
            background: linear-gradient(to bottom, #000, transparent);
            border-bottom: 2px solid var(--primary-fire);
            box-shadow: 0 0 20px var(--border-glow);
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 8vw, 3.5rem); /* Ajuste dinámico */
            color: var(--primary-fire);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            text-shadow: 3px 3px 0px #000, 0 0 15px var(--primary-fire);
        }

        .slogan {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.7rem, 3vw, 1rem);
            letter-spacing: clamp(3px, 1.5vw, 8px);
            color: var(--text-light);
            margin-top: 10px;
            opacity: 0.8;
        }

        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: auto;
        }

        .sidebar {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 4px;
            border: 1px solid #333;
            height: fit-content;
        }

        /* Estilos de input y select */
        .faction-select, .army-title-input {
            width: 100%;
            padding: 12px;
            background: #000;
            color: var(--primary-fire);
            border: 1px solid var(--primary-fire);
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-size: 16px; /* Evita zoom automático en iOS */
        }

        .army-title-input {
            color: white;
            text-transform: none;
            font-family: 'Inter', sans-serif;
        }

        .unit-card-add {
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 700;
        }

        .points-panel {
            background: linear-gradient(90deg, #000, #222);
            padding: 20px;
            border-radius: 4px;
            border-right: 5px solid var(--primary-fire);
            display: flex;
            flex-direction: column; /* Columna en móvil por defecto */
            gap: 20px;
            margin-bottom: 30px;
        }

        .total-points {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary-fire);
        }

        .unit-instance {
            background: var(--bg-card);
            border: 1px solid #333;
            margin-bottom: 20px;
            padding: 20px;
            position: relative;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.5);
        }

        .unit-instance h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: var(--secondary-fire);
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-top: 0;
            padding-right: 80px; /* Espacio para el botón eliminar */
        }

        .grid-controls {
            display: grid; 
            grid-template-columns: 1fr; /* Una columna en móvil */
            gap: 15px; 
            margin-top: 15px;
        }

        label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 900;
            color: #888;
            margin-bottom: 5px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            font-size: 16px;
        }

        .btn-remove {
            position: absolute; top: 15px; right: 15px;
            background: #444; border: none; color: white;
            padding: 5px 10px; cursor: pointer; font-size: 0.7rem;
            font-weight: bold;
        }

        .btn-download {
            background: var(--primary-fire);
            color: black;
            border: none;
            padding: 15px;
            font-weight: 900;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%; /* Ancho total en móvil */
        }

        .subtotal-area {
            margin-top: 20px;
            text-align: right;
            font-weight: 900;
            color: var(--primary-fire);
        }

        /* --- QUERIES PARA ESCRITORIO --- */
        @media (min-width: 900px) {
            .container { gap: 30px; padding: 40px; }
            .sidebar { position: sticky; top: 20px; }
            .points-panel { flex-direction: row; padding: 20px 40px; }
            .btn-download { width: auto; }
            .grid-controls { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
            .total-points { font-size: 3rem; }
        }

        @media (max-width: 899px) {
            .container { grid-template-columns: 1fr; } /* Colapsar a una columna */
            header { padding: 20px 10px; }
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo-text">Doom Empire</h1>
    <div class="slogan">FAST • BRUTAL • DECISIVE</div>
</header>

<div class="container">
    <aside class="sidebar">
        <label>Nombre del Ejército</label>
        <input type="text" id="armyName" class="army-title-input" placeholder="Nombre de lista...">
        
        <label>Seleccionar Legión</label>
        <select id="fSelect" class="faction-select" onchange="loadCatalog()">
            <option value="Estados Cruzados">Estados Cruzados</option>
            <option value="Imperio Mexica">Imperio Mexica</option>
        </select>
        <div id="catalog"></div>
    </aside>

    <main>
        <div class="points-panel">
            <div style="flex: 1;">
                <h2 style="margin:0; font-family: 'Cinzel'; font-size: 1.1rem;">Fuerza de Combate</h2>
                <div class="total-points"><span id="totalPoints">0</span> <small style="font-size: 1rem;">PTS</small></div>
            </div>
            <button class="btn-download" onclick="generatePDF()">Descargar PDF</button>
        </div>
        <div id="armyList"></div>
    </main>
</div>

<script>
const DATA = {
    "Estados Cruzados": [
        { name: "Caballero Verde", sizes: [1], costs: [22], hasSpecials: false },
        { name: "Caballeros Templarios", sizes: [3, 5, 10], costs: [42, 70, 140], hasSpecials: false },
        { name: "Caballeros Cruzados", sizes: [5, 10, 15, 20], costs: [55, 110, 165, 220], hasSpecials: true, baseWeaponPrice: 11,
          options: [{n:"Ninguna / Espada", p:11}, {n:"Hacha", p:13}, {n:"Martillo", p:15}, {n:"Lanza", p:11}] },
        { name: "Caballeros Leprosos", sizes: [5, 10, 15, 20], costs: [60, 120, 180, 240], hasSpecials: false },
        { name: "Hombres de Armas", sizes: [10, 15, 20, 25, 30], costs: [70, 105, 140, 175, 210], hasSpecials: true, baseWeaponPrice: 7,
          options: [{n:"Ninguna / Espada", p:7}, {n:"Hacha", p:8}, {n:"Martillo", p:11}] },
        { name: "Campesinos", sizes: [10, 15, 20, 25, 30, 35, 40], costs: [40, 60, 80, 100, 120, 140, 160], hasSpecials: false }
    ],
    "Imperio Mexica": [
        { name: "Camatoz", sizes: [1], costs: [22], hasSpecials: false },
        { name: "Guerreros Jaguar", sizes: [5, 10, 15, 20], costs: [55, 110, 165, 220], hasSpecials: false },
        { name: "Cuextecatl", sizes: [10, 15, 20, 25, 30], costs: [90, 135, 180, 225, 270], hasSpecials: true, baseWeaponPrice: 9,
          options: [{n:"Ninguna / Macuahuitl", p:9}, {n:"Mazo", p:11}] },
        { name: "Cuextecatl Lanza", sizes: [10, 15, 20, 25, 30], costs: [70, 105, 140, 175, 210], hasSpecials: false },
        { name: "Arqueros Totolt", sizes: [10, 15, 20], costs: [60, 90, 120], hasSpecials: true, baseWeaponPrice: 6,
          options: [{n:"Ninguna / Arco", p:6}, {n:"Atlatl", p:11}] },
        { name: "Yaokis", sizes: [30, 35, 40], costs: [120, 140, 160], hasSpecials: false }
    ]
};

let myArmy = [];

function loadCatalog() {
    const f = document.getElementById('fSelect').value;
    const cat = document.getElementById('catalog');
    cat.innerHTML = '';
    DATA[f].forEach(u => {
        const d = document.createElement('div');
        d.className = 'unit-card-add';
        d.innerHTML = `<span>${u.name}</span> <span style="color:var(--primary-fire)">+</span>`;
        d.onclick = () => { myArmy.push({...u, id: Date.now(), sIdx: 0, w1: 0, w2: 0}); render(); };
        cat.appendChild(d);
    });
}

function render() {
    const list = document.getElementById('armyList');
    list.innerHTML = '';
    let total = 0;

    myArmy.forEach((unit, i) => {
        const baseCost = unit.costs[unit.sIdx];
        let finalCost = baseCost;
        if(unit.hasSpecials) {
            finalCost += (unit.options[unit.w1].p - unit.baseWeaponPrice);
            finalCost += (unit.options[unit.w2].p - unit.baseWeaponPrice);
        }
        total += finalCost;
        const card = document.createElement('div');
        card.className = 'unit-instance';
        card.innerHTML = `
            <button class="btn-remove" onclick="myArmy.splice(${i},1); render();">ELIMINAR</button>
            <h3>${unit.name}</h3>
            <div class="grid-controls">
                <div>
                    <label>Bloque de Unidad</label>
                    <select onchange="myArmy[${i}].sIdx=this.selectedIndex; render();">
                        ${unit.sizes.map((s, idx) => `<option value="${idx}" ${unit.sIdx==idx?'selected':''}>${s} minis (${unit.costs[idx]} pts)</option>`).join('')}
                    </select>
                </div>
                ${unit.hasSpecials ? `
                <div><label>Mejora Arma 1</label><select onchange="myArmy[${i}].w1=this.selectedIndex; render();">
                    ${unit.options.map((o, idx) => `<option value="${idx}" ${unit.w1==idx?'selected':''}>${o.n}</option>`).join('')}
                </select></div>
                <div><label>Mejora Arma 2</label><select onchange="myArmy[${i}].w2=this.selectedIndex; render();">
                    ${unit.options.map((o, idx) => `<option value="${idx}" ${unit.w2==idx?'selected':''}>${o.n}</option>`).join('')}
                </select></div>` : ''}
            </div>
            <div class="subtotal-area">TOTAL: ${finalCost} PTS</div>
        `;
        list.appendChild(card);
    });
    document.getElementById('totalPoints').innerText = total;
}

function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const armyTitle = document.getElementById('armyName').value || "Lista de Ejercito";
    const faction = document.getElementById('fSelect').value;
    const total = document.getElementById('totalPoints').innerText;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(20);
    doc.text(armyTitle.toUpperCase(), 14, 20);
    doc.setFontSize(12);
    doc.text(`FACCION: ${faction.toUpperCase()}`, 14, 30);
    doc.text(`FUERZA TOTAL: ${total} PTS`, 14, 37);

    const body = myArmy.map(u => {
        let cost = u.costs[u.sIdx];
        let eq = "EQUIPO BASE";
        if(u.hasSpecials) {
            cost += (u.options[u.w1].p - u.baseWeaponPrice) + (u.options[u.w2].p - u.baseWeaponPrice);
            eq = `${u.options[u.w1].n} / ${u.options[u.w2].n}`;
        }
        return [u.name, u.sizes[u.sIdx], eq, `${cost} pts`];
    });

    doc.autoTable({
        startY: 45,
        head: [['UNIDAD', 'MINIS', 'EQUIPO', 'PUNTOS']],
        body: body,
        theme: 'grid',
        headStyles: { fillColor: [255, 102, 0], textColor: [0, 0, 0] }
    });

    doc.save(`${armyTitle.replace(/\s+/g, '_')}.pdf`);
}

loadCatalog();
</script>
</body>
</html>
