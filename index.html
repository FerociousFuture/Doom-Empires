<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom Empire | War Game Builder</title>
    <link rel="icon" type="image/jpeg" href="LogoDE.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary-fire: #ff6600;
            --secondary-fire: #ffcc00;
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --text-light: #e0e0e0;
        }

        * { box-sizing: border-box; transition: all 0.25s ease; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary-fire);
            background: #000;
        }

        .main-logo { max-width: 250px; width: 60%; filter: drop-shadow(0 0 8px var(--primary-fire)); }

        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: auto;
        }

        .sidebar { background: var(--bg-card); padding: 20px; border: 1px solid #333; height: fit-content; }

        .faction-select, .army-title-input {
            width: 100%; padding: 12px; background: #000; color: var(--primary-fire);
            border: 1px solid var(--primary-fire); font-weight: 900; margin-bottom: 15px;
        }

        .unit-card-add {
            background: #1a1a1a; padding: 12px; margin-bottom: 8px;
            border-left: 3px solid #444; display: flex; justify-content: space-between; cursor: pointer;
        }

        .unit-card-add:hover { border-left-color: var(--primary-fire); background: #252525; }

        .points-panel {
            background: linear-gradient(90deg, #000, #222);
            padding: 20px; border-right: 5px solid var(--primary-fire);
            display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px;
        }

        .unit-instance {
            background: var(--bg-card); border: 1px solid #333;
            margin-bottom: 20px; padding: 20px; position: relative;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.6);
        }

        .grid-controls { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 15px; }

        label { font-size: 0.7rem; font-weight: 900; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }

        select, input[type="number"], input[type="text"] { width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #444; }

        .btn-remove { position: absolute; top: 15px; right: 15px; background: none; border: 1px solid #444; color: #666; padding: 5px 10px; cursor: pointer; }
        .btn-remove:hover { color: #ff4444; border-color: #ff4444; }

        .btn-download {
            background: var(--primary-fire); color: black; border: none;
            padding: 15px; font-weight: 900; font-family: 'Cinzel'; cursor: pointer;
        }

        .subtotal-area {
            margin-top: 20px;
            text-align: right;
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--primary-fire);
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .weapon-slot {
            background: rgba(255, 102, 0, 0.05);
            border: 1px dashed #444;
            padding: 10px;
            border-radius: 4px;
        }

        @media (min-width: 900px) {
            .container { grid-template-columns: 320px 1fr; }
            .points-panel { flex-direction: row; align-items: center; justify-content: space-between; }
            .grid-controls { grid-template-columns: 1.2fr 1fr 1fr; }
        }

        @media (max-width: 899px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <img src="LogoDE.jpeg" alt="Doom Empire" class="main-logo">
    <div style="font-family:'Cinzel'; letter-spacing:5px; font-size:0.8rem; margin-top:10px; color: #eee;">FAST • BRUTAL • DECISIVE</div>
</header>

<div class="container">
    <aside class="sidebar">
        <label>Nombre del Ejército</label>
        <input type="text" id="armyName" class="army-title-input" placeholder="Mi Horda...">
        <label>Facción</label>
        <select id="fSelect" class="faction-select" onchange="loadCatalog()">
            <option value="Estados Cruzados">Estados Cruzados</option>
            <option value="Imperio Mexica">Imperio Mexica</option>
        </select>
        <div id="catalog"></div>
    </aside>

    <main>
        <div class="points-panel">
            <div style="flex: 1;">
                <h2 style="margin:0; font-family: 'Cinzel'; font-size: 1rem;">Total de Puntos</h2>
                <div style="font-size: 2.5rem; color: var(--primary-fire); font-weight: 900;"><span id="totalPoints">0</span> <small style="font-size: 1rem;">PTS</small></div>
            </div>
            <button class="btn-download" onclick="generatePDF()">Descargar PDF</button>
        </div>
        <div id="armyList"></div>
    </main>
</div>

<script>
const DATA = {
    "Estados Cruzados": [
        { name: "Caballero Verde", sizes: [1], costs: [22], hasSpecials: false },
        { name: "Caballeros Templarios", sizes: [3, 5, 10], costs: [60, 100, 200], hasSpecials: false },
        { name: "Caballeros Cruzados", sizes: [5, 10, 15, 20], costs: [60, 120, 180, 240], hasSpecials: true, baseName: "Espada (Base)",
          options: [{n:"Lanza", p:12}, {n:"Hacha", p:13}, {n:"Martillo", p:15}] },
        { name: "Caballeros Leprosos", sizes: [5, 10, 15, 20], costs: [60, 120, 180, 240], hasSpecials: false },
        { name: "Hombres de Armas", sizes: [10, 15, 20, 25, 30], costs: [70, 105, 140, 175, 210], hasSpecials: true, baseName: "Espada (Base)",
          options: [{n:"Hacha", p:8}, {n:"Martillo", p:11}] },
        { name: "Campesinos", sizes: [10, 15, 20, 25, 30, 35, 40], costs: [40, 60, 80, 100, 120, 140, 160], hasSpecials: false }
    ],
    "Imperio Mexica": [
        { name: "Camatoz", sizes: [1], costs: [22], hasSpecials: false },
        { name: "Guerreros Jaguar", sizes: [5, 10, 15, 20], costs: [55, 110, 165, 220], hasSpecials: false },
        { name: "Cuextecatl", sizes: [10, 15, 20, 25, 30], costs: [90, 135, 180, 225, 270], hasSpecials: true, baseName: "Macuahuitl (Base)",
          options: [{n:"Mazo", p:11}] },
        { name: "Cuextecatl con Lanza", sizes: [10, 15, 20, 25, 30], costs: [70, 105, 140, 175, 210], hasSpecials: false },
        { name: "Arqueros Totolt", sizes: [10, 15, 20], costs: [60, 90, 120], hasSpecials: true, baseName: "Arco (Base)",
          options: [{n:"Atlatl", p:11}] },
        { name: "Yaokis", sizes: [30, 35, 40], costs: [120, 140, 160], hasSpecials: false }
    ]
};

let myArmy = [];

function loadCatalog() {
    const f = document.getElementById('fSelect').value;
    const cat = document.getElementById('catalog');
    cat.innerHTML = '';
    DATA[f].forEach(u => {
        const d = document.createElement('div');
        d.className = 'unit-card-add';
        d.innerHTML = `<span>${u.name}</span> <span>+</span>`;
        d.onclick = () => { 
            myArmy.push({
                ...u, 
                id: Date.now(), 
                sIdx: 0, 
                w1Idx: -1, w1Qty: 0,
                w2Idx: -1, w2Qty: 0
            }); 
            render(); 
        };
        cat.appendChild(d);
    });
}

function updateQty(i, type, val) {
    const unit = myArmy[i];
    const size = unit.sizes[unit.sIdx];
    let nVal = parseInt(val) || 0;

    if(type === 'w1') {
        if(nVal + unit.w2Qty > size) nVal = size - unit.w2Qty;
        unit.w1Qty = Math.max(0, nVal);
    } else {
        if(nVal + unit.w1Qty > size) nVal = size - unit.w1Qty;
        unit.w2Qty = Math.max(0, nVal);
    }
    render();
}

function render() {
    const list = document.getElementById('armyList');
    list.innerHTML = '';
    let totalArmyPoints = 0;

    myArmy.forEach((unit, i) => {
        const size = unit.sizes[unit.sIdx];
        const baseQty = size - unit.w1Qty - unit.w2Qty;
        
        let unitTotal = unit.costs[unit.sIdx];
        if(unit.hasSpecials) {
            if(unit.w1Idx !== -1) unitTotal += (unit.w1Qty * unit.options[unit.w1Idx].p);
            if(unit.w2Idx !== -1) unitTotal += (unit.w2Qty * unit.options[unit.w2Idx].p);
        }

        totalArmyPoints += unitTotal;
        const card = document.createElement('div');
        card.className = 'unit-instance';
        card.innerHTML = `
            <button class="btn-remove" onclick="myArmy.splice(${i},1); render();">QUITAR</button>
            <h3 style="margin:0; font-family:'Cinzel'; color:var(--secondary-fire);">${unit.name}</h3>
            
            <div class="grid-controls">
                <div>
                    <label>Bloque de Unidad</label>
                    <select onchange="myArmy[${i}].sIdx=this.selectedIndex; myArmy[${i}].w1Qty=0; myArmy[${i}].w2Qty=0; render();">
                        ${unit.sizes.map((s, idx) => `<option value="${idx}" ${unit.sIdx==idx?'selected':''}>${s} Miniaturas (${unit.costs[idx]} pts)</option>`).join('')}
                    </select>
                </div>
                
                ${unit.hasSpecials ? `
                <div class="weapon-slot">
                    <label>Mejora de Arma 1</label>
                    <select onchange="myArmy[${i}].w1Idx=this.selectedIndex - 1; myArmy[${i}].w1Qty=0; render();">
                        <option value="0">--- Ninguna ---</option>
                        ${unit.options.map((o, idx) => `<option value="${idx+1}" ${unit.w1Idx==idx?'selected':''}>${o.n} (${o.p} pts/u)</option>`).join('')}
                    </select>
                    ${unit.w1Idx !== -1 ? `<label style="margin-top:5px">Nº Minis</label><input type="number" value="${unit.w1Qty}" min="0" max="${size}" onchange="updateQty(${i}, 'w1', this.value)">` : ''}
                </div>
                <div class="weapon-slot">
                    <label>Mejora de Arma 2</label>
                    <select onchange="myArmy[${i}].w2Idx=this.selectedIndex - 1; myArmy[${i}].w2Qty=0; render();">
                        <option value="0">--- Ninguna ---</option>
                        ${unit.options.map((o, idx) => `<option value="${idx+1}" ${unit.w2Idx==idx?'selected':''}>${o.n} (${o.p} pts/u)</option>`).join('')}
                    </select>
                    ${unit.w2Idx !== -1 ? `<label style="margin-top:5px">Nº Minis</label><input type="number" value="${unit.w2Qty}" min="0" max="${size}" onchange="updateQty(${i}, 'w2', this.value)">` : ''}
                </div>
                ` : '<div></div><div></div>'}
            </div>
            
            <div style="font-size: 0.8rem; margin-top: 10px; color: #888;">
                Equipamiento: ${baseQty}x ${unit.baseName || 'Base'} 
                ${unit.w1Idx !== -1 && unit.w1Qty > 0 ? ', ' + unit.w1Qty + 'x ' + unit.options[unit.w1Idx].n : ''} 
                ${unit.w2Idx !== -1 && unit.w2Qty > 0 ? ', ' + unit.w2Qty + 'x ' + unit.options[unit.w2Idx].n : ''}
            </div>

            <div class="subtotal-area">SUBTOTAL: ${unitTotal} PTS</div>
        `;
        list.appendChild(card);
    });
    document.getElementById('totalPoints').innerText = totalArmyPoints;
}

function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const title = document.getElementById('armyName').value || "LISTA DE BATALLA";
    const faction = document.getElementById('fSelect').value;
    const total = document.getElementById('totalPoints').innerText;

    doc.setFont("helvetica", "bold"); doc.setFontSize(22);
    doc.text(title.toUpperCase(), 14, 20);
    doc.setFontSize(10);
    doc.text(`FACCION: ${faction.toUpperCase()} | TOTAL: ${total} PTS`, 14, 28);

    const body = myArmy.map(u => {
        const size = u.sizes[u.sIdx];
        const bQty = size - u.w1Qty - u.w2Qty;
        let uCost = u.costs[u.sIdx];
        let desc = `${bQty}x ${u.baseName || 'Base'}`;
        if(u.hasSpecials) {
            if(u.w1Idx !== -1 && u.w1Qty > 0) {
                uCost += u.w1Qty * u.options[u.w1Idx].p;
                desc += `, ${u.w1Qty}x ${u.options[u.w1Idx].n}`;
            }
            if(u.w2Idx !== -1 && u.w2Qty > 0) {
                uCost += u.w2Qty * u.options[u.w2Idx].p;
                desc += `, ${u.w2Qty}x ${u.options[u.w2Idx].n}`;
            }
        }
        return [u.name, size, desc, `${uCost} pts`];
    });

    doc.autoTable({ startY: 35, head: [['UNIDAD', 'MINIS', 'COMPOSICION', 'PUNTOS']], body: body, theme: 'grid', headStyles: {fillColor:[255, 102, 0]} });
    doc.save("Lista_Doom_Empire.pdf");
}
loadCatalog();
</script>
</body>
</html>
